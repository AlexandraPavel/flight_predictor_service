{% load rest_framework %}

<html><body>

<h1>Configure your flight</h1>

<form action='' method="post">
    <!-- {% csrf_token %} -->
        <label>Departure:</label>
        <input>{{ form.departure }}</input> 
    </br>
        <label>Destination:</label>
        <input>{{ form.destination }}</input>
    </br>
        <label>Departure date:</label>
        <input>{{ form.flight_date }}</input>
    </br>
        <label>Return date:</label>
        <input>{{ form.arrival_date }}</input>
    </br>
    <input type="submit" value="Submit">
</form>

</body></html>
